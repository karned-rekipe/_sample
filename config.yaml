app:
  name: rekipe-sample
  version: "0.1.0"

adapters:
  logger: console
  repository: mongodb    # choix : memory  mongodb  duckdb
  multitenant: false

  mongodb:
    db_name: _sample      # uri → secrets.yaml ou Vault

  duckdb:
    path: data/

api:
  host: 0.0.0.0
  port: 8000
  reload: true

mcp:
  host: 127.0.0.1
  port: 8001

soft_delete:
  retention_days: 30

probe:
  host: 0.0.0.0
  port: 9000
  enabled: true

secrets:
  resolver: chain
  chain: [vault, yaml]
  mappings:
    adapters.mongodb.uri: rekipe/sample/mongodb

  vault:
    addr: http://127.0.0.1:8200
    mount: kv

  yaml:
    path: secrets.yaml

