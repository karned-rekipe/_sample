app:
  name: Rekipe Sample API
  version: "0.1.0"
  description: "Sandbox R&D pour tester le framework arclith - CRUD Ingredient minimal (ne jamais déployer en production)"

adapters:
  logger: console
  repository: mongodb    # choix : memory  mongodb  duckdb

  mongodb:
    multitenant: false   # true = URI + db_name résolus par requête via JWT → Vault
    db_name: _sample      # uri → secrets.yaml ou Vault (fallback single-tenant)

  duckdb:
    multitenant: false
    path: data/

api:
  host: 0.0.0.0
  port: 8000
  reload: true

mcp:
  host: 127.0.0.1
  port: 8001

soft_delete:
  retention_days: 30

probe:
  host: 0.0.0.0
  port: 9000
  enabled: true

# ── Multi-tenant (activer mongodb.multitenant: true pour utiliser) ────────────

keycloak:
  url: http://127.0.0.1:8080
  realm: rekipe
  # audience: rekipe-sample   # optionnel — valide le claim "aud" du JWT

tenant:
  vault_addr: http://127.0.0.1:5991
  vault_mount: kv
  vault_path_prefix: rekipe/tenants   # secret path : rekipe/tenants/{tenant_id}
  tenant_claim: sub                   # claim JWT portant le tenant_id

license:
  role: rekipe:licensed               # Keycloak realm role requis pour accéder au service

cache:
  backend: memory    # memory (par process) | redis (partagé multi-workers)
  redis_url: redis://127.0.0.1:6379
  jwks_ttl: 3600     # secondes — durée de cache des clés publiques Keycloak
  tenant_uri_ttl: 300  # secondes — durée de cache de l'URI MongoDB par tenant

# ── Secrets ───────────────────────────────────────────────────────────────────

secrets:
  resolver: vault
  chain: [vault, yaml]
  mappings:
    adapters.mongodb.uri: rekipe/sample/mongodb

  vault:
    addr: http://127.0.0.1:5991
    mount: kv

  yaml:
    path: secrets.yaml

